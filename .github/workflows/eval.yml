name: eval

on:
  workflow_dispatch:
    inputs:
      compressed_dir:
        description: 'Link to compressed_dir zip (e.g. https://github.com/user-attachments/files/26130120/submission.zip)'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download and extract compressed_dir
        run: |
          curl -L -o submission.zip "${{ inputs.compressed_dir }}"
          unzip submission.zip -d .

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (cpu)
        run: uv sync --group cpu

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Evaluate
        run: uv run --group cpu python evaluate.py --device cpu --dataloader examples/baseline_dataloader_fast.py

      - name: Print report
        run: cat report.txt
